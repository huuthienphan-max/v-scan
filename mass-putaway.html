<!-- mass-putaway.html -->
<div style="padding:20px; background:red; color:white; font-size:24px; margin-bottom:10px;">
🔴 ĐÂY LÀ TRANG MASS PUTAWAY - ĐÃ LOAD THÀNH CÔNG
</div>

<div id="massput-box-info" style="margin:20px; padding:30px; background:blue; color:white; font-size:20px; border-radius:10px;">
⏳ ĐANG TẢI DỮ LIỆU...
</div>

<script>
window.onload = function() {
    console.log('🔥 WINDOW ONLOAD ĐÃ CHẠY');
    
    // HIỂN THỊ TEST
    document.getElementById('massput-box-info').innerHTML = '✅ ONLOAD ĐÃ CHẠY!';
    
    // Lấy dữ liệu
    setTimeout(function() {
        const data = sessionStorage.getItem('massPutFullInfo');
        if (data) {
            const box = JSON.parse(data);
            document.getElementById('massput-box-info').innerHTML = `
                <div style="background:#eef2ff; color:#333; padding:20px;">
                    <div style="font-size:24px;">📦 ${box.box}</div>
                    <div>PO: ${box.po}</div>
                    <div>SKU: ${box.sku}</div>
                </div>
            `;
        }
    }, 1000);
};
</script>
