<!-- mass-putaway.html - Module Mass Putaway -->
<div id="mass-putaway-module" class="space-y-6">
    <!-- CHIA 2 CỘT: BOX INFO + FORM -->
    <div class="grid grid-cols-12 gap-6">
        <!-- CỘT TRÁI: THÔNG TIN BOX (4 phần) -->
        <div class="col-span-4">
            <div class="bg-white rounded-lg shadow p-6 border-t-4 border-t-indigo-500 h-full">
                <h4 class="font-bold text-sm mb-4 text-indigo-600">📦 THÔNG TIN BOX</h4>
                <div id="massput-box-info" class="text-gray-700">
                    <div class="text-gray-400 text-center py-4">Đang tải...</div>
                </div>
            </div>
        </div>

        <!-- CỘT PHẢI: FORM MASS PUTAWAY (8 phần) -->
        <div class="col-span-8">
            <!-- Form nhập liệu -->
            <div class="bg-white rounded-lg shadow p-6 border-t-4 border-t-indigo-500">
                <h3 class="font-bold text-lg mb-4 text-indigo-600">⚡ Mass Putaway - Nhập hàng loạt</h3>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-500">TÀI KHOẢN</label>
                        <input type="text" id="mass-account" class="w-full border p-2 rounded" value="admin">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500">MẬT KHẨU</label>
                        <input type="password" id="mass-password" class="w-full border p-2 rounded" value="123456">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500">WH</label>
                        <input type="text" id="mass-wh" class="w-full border p-2 rounded bg-gray-100" value="VNS" readonly>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500">BOX</label>
                        <input type="text" id="mass-box" class="w-full border p-2 rounded font-bold uppercase" placeholder="Nhập mã Box...">
                    </div>
                    <div class="col-span-2">
                        <label class="text-xs font-bold text-gray-500">LOCATION PUT</label>
                        <input type="text" id="mass-location" class="w-full border p-2 rounded" placeholder="Nhập vị trí (VD: A-01-01)...">
                    </div>
                    <div class="col-span-2">
                        <button onclick="processMassPutaway()" class="w-full bg-indigo-600 text-white py-2 rounded font-bold hover:bg-indigo-700">
                            🚀 XỬ LÝ
                        </button>
                    </div>
                </div>
                <div id="mass-result" class="mt-4 hidden p-3 rounded"></div>
            </div>
        </div>
    </div>
</div>

<script>
// CODE ĐƠN GIẢN NHẤT - CHỈ HIỂN THỊ BOX
(function() {
    // Đợi DOM load
    setTimeout(function() {
        console.log('🔍 Đang kiểm tra...');
        
        // Lấy dữ liệu
        const savedInfo = sessionStorage.getItem('massPutFullInfo');
        console.log('📦 Dữ liệu:', savedInfo);
        
        if (!savedInfo) {
            document.getElementById('massput-box-info').innerHTML = '<div class="text-gray-400 text-center py-4">Chưa có box</div>';
            return;
        }
        
        const boxData = JSON.parse(savedInfo);
        console.log('✅ Box:', boxData.box);
        
        // Điền vào ô input
        const boxInput = document.getElementById('mass-box');
        if (boxInput) boxInput.value = boxData.box;
        
        // Hiển thị thông tin
        document.getElementById('massput-box-info').innerHTML = `
            <div style="background: #eef2ff; padding: 15px; border-radius: 8px;">
                <div style="font-size: 18px; font-weight: bold; color: #4f46e5;">📦 ${boxData.box}</div>
                <div style="margin-top: 10px;">
                    <div><span style="color: #6b7280;">PO:</span> ${boxData.po}</div>
                    <div><span style="color: #6b7280;">SKU:</span> ${boxData.sku}</div>
                    <div><span style="color: #6b7280;">SL:</span> ${boxData.total}</div>
                </div>
            </div>
        `;
    }, 500);
})();

// Hàm xử lý
window.processMassPutaway = function() {
    alert('Đang xử lý: ' + document.getElementById('mass-box').value);
};
</script>
