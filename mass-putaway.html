<!-- mass-putaway.html -->
<script>
console.log('🔥 SCRIPT THẬT ĐANG CHẠY');

// Lấy dữ liệu từ sessionStorage
const savedInfo = sessionStorage.getItem('massPutFullInfo');
console.log('📦 Dữ liệu:', savedInfo);

if (savedInfo) {
    try {
        const box = JSON.parse(savedInfo);
        console.log('✅ Box:', box.box);
        
        // Hiển thị thông tin
        document.getElementById('massput-box-info').innerHTML = `
            <div style="background:#eef2ff; padding:20px; border-radius:10px;">
                <div style="font-size:22px; font-weight:bold; color:#4f46e5;">📦 ${box.box}</div>
                <div>PO: ${box.po}</div>
                <div>SKU: ${box.sku}</div>
                <div>SL: ${box.total}</div>
            </div>
        `;
    } catch (e) {
        console.error('Lỗi:', e);
    }
}
</script>
