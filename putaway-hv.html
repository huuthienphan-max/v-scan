<!-- putaway-hv.html -->
<div id="putaway-module" class="space-y-6">
    <!-- Header thống kê -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
        <div class="card p-6" style="background: linear-gradient(135deg, #3b82f6, #2563eb);">
            <p class="text-white text-xs uppercase opacity-80">Chờ xử lý</p>
            <p class="text-white text-4xl font-bold mt-2" id="putaway-pending">0</p>
        </div>
        <div class="card p-6" style="background: linear-gradient(135deg, #10b981, #059669);">
            <p class="text-white text-xs uppercase opacity-80">Đã xử lý hôm nay</p>
            <p class="text-white text-4xl font-bold mt-2" id="putaway-today">0</p>
        </div>
        <div class="card p-6" style="background: linear-gradient(135deg, #8b5cf6, #7c3aed);">
            <p class="text-white text-xs uppercase opacity-80">Tổng đã xử lý</p>
            <p class="text-white text-4xl font-bold mt-2" id="putaway-total">0</p>
        </div>
        <div class="card p-6" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
            <p class="text-white text-xs uppercase opacity-80">Lần cuối</p>
            <p class="text-white text-sm font-bold mt-2" id="putaway-last">Chưa có</p>
        </div>
    </div>

    <!-- Bộ lọc -->
    <div class="card p-6">
        <h3 class="font-bold text-sm mb-4">🔍 Bộ lọc tìm kiếm</h3>
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase">Từ ngày</label>
                <input type="date" id="putaway-from-date" class="w-full input-wms">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase">Đến ngày</label>
                <input type="date" id="putaway-to-date" class="w-full input-wms">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase">Mã PO</label>
                <input type="text" id="putaway-po" placeholder="Nhập PO..." class="w-full input-wms">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase">Trạng thái</label>
                <select id="putaway-status" class="w-full input-wms">
                    <option value="pending">Chờ xử lý</option>
                    <option value="completed">Đã xử lý</option>
                    <option value="all">Tất cả</option>
                </select>
            </div>
            <div class="flex items-end gap-2">
                <button onclick="filterPutawayBoxes()" class="btn-shopee px-4 py-2 rounded text-xs font-bold">LỌC</button>
                <button onclick="resetPutawayFilter()" class="bg-gray-200 px-4 py-2 rounded text-xs font-bold">RESET</button>
            </div>
        </div>
    </div>

    <!-- Danh sách Box -->
    <div class="card p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-sm">📦 Danh sách Box</h3>
            <button onclick="exportPutawayList()" class="bg-emerald-600 text-white px-4 py-2 rounded text-xs font-bold hover:bg-emerald-700">
                Xuất Excel
            </button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full table-vscan">
                <thead>
                    <tr>
                        <th>Mã Box</th>
                        <th>Mã PO</th>
                        <th>SKU</th>
                        <th class="text-center">SL</th>
                        <th>Ngày tạo</th>
                        <th>Người tạo</th>
                        <th>Trạng thái</th>
                        <th class="text-center">Hành động</th>
                    </tr>
                </thead>
                <tbody id="putaway-box-tbody">
                    <tr><td colspan="8" class="text-center py-8">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
