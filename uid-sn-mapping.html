<div id="uid-sn-module" class="space-y-6">

    <!-- SCAN -->
    <div class="card p-6">
        <h3 class="font-bold text-sm mb-4">🔗 Mapping UID - SN</h3>

        <input id="scan-input"
               placeholder="Scan UID hoặc SN..."
               class="w-full input-wms"
               onkeydown="handleScanInput(event)">

        <div class="mt-3 text-sm">
            UID: <span id="current-uid" class="font-bold text-blue-600">-</span>
        </div>

        <div id="sn-list" class="mt-3 text-sm"></div>

        <div class="flex gap-2 mt-4">
            <button onclick="saveMappingCombo()" class="btn-shopee px-4 py-2 text-xs">
                Lưu Mapping
            </button>
            <button onclick="resetMapping()" class="bg-gray-200 px-4 py-2 text-xs rounded">
                Reset
            </button>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="card p-6">
        <h3 class="font-bold text-sm mb-4">🔍 Tra cứu</h3>

        <input id="search-key" placeholder="Nhập UID hoặc SN..." class="w-full input-wms">
        <button onclick="searchMapping()" class="btn-shopee mt-2 px-4 py-2 text-xs">Tìm</button>

        <div id="search-result" class="mt-3 text-sm"></div>
    </div>

</div>
